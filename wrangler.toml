# Cloudflare Pages – deploy with: npm run deploy
# Or: npx wrangler pages deploy dist/public
# First time: npx wrangler pages project create ballistiq (or your project name)
#
# Git deploy / Wrangler Pages deploy: Build command = "npm run build", then "npx wrangler pages deploy dist/public"
# Custom domain: Dashboard → Custom domains → Add ballistiq.xyz (see DEPLOY.md)
# Note: Pages config does not support "account_id" — do not add it.

name = "web1"
compatibility_date = "2024-01-01"
main = "./worker/index.ts"

# Static output from npm run build (client + admin-console → dist/public)
# For Pages Git deploy: set Build output directory to "dist/public" in Dashboard if not using this file.
pages_build_output_dir = "./dist/public"

[assets]
directory = "./dist/public"
binding = "STATIC_ASSETS"
