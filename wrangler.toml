# Cloudflare: static site from `npm run build` (client + admin-console → dist/public).
#
# - Workers (Git "Deploy to Workers" / `wrangler deploy`): uses `main` + [assets] below.
# - Pages: run `npx wrangler pages deploy dist/public` (output path is explicit; see DEPLOY.md).
#
# `pages_build_output_dir` alone is not enough for `wrangler deploy` — Wrangler requires
# either `main` or `[assets].directory` (see Workers static assets docs).

name = "web"
compatibility_date = "2024-11-01"
main = "workers/static-site.ts"

[assets]
directory = "./dist/public"
binding = "ASSETS"
